{% extends 'base.html' %}

{% block title %}Login - Smart Gate Pass System{% endblock %}

{% block content %}
<div class="container-custom">
    <div class="card-custom p-4 p-md-5 narrow-card">
        <h2 class="text-center mb-4">Login</h2>
        
        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 btn-lg">
                Login
            </button>
        </form>
        
        <hr class="my-4">
        
        <div class="text-center mb-3">
            <a href="{% url 'accounts:forgot_password' %}" class="btn btn-outline-warning btn-sm w-100">
                <i class="fas fa-question-circle me-2"></i>Forgot Password?
            </a>
        </div>
        
        <p class="text-center">Don't have an account?</p>
        <a href="{% url 'accounts:register_resident' %}" class="btn btn-outline-primary btn-sm w-100 mb-2">
            Register as Resident
        </a>
        <a href="{% url 'accounts:register_guard' %}" class="btn btn-outline-primary btn-sm w-100">
            Register as Security Guard
        </a>
    </div>
</div>
{% endblock %}
